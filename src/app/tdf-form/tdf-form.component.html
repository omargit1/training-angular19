<div class="container">
  <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)">
    <pre> valid: {{ userForm.valid }}</pre>
    <pre> Valeur sélectionnée : {{ selectedCourse }}</pre>
    <h2 class="text-center m-2">User Registration</h2>
    <div class="form-group m-2">
      <label>First Name</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter First name"
        name="firstName"
        #fname="ngModel"
        [(ngModel)]="userObject.firstName"
        required
        minlength="5"
      />
      @if (!userForm.pristine && fname?.errors?.["required"]) {
        <small class="text-danger">First name is required</small>
      }
      @if (fname?.errors?.["minlength"]) {
        <small class="text-danger"
          >First name must be at least 5 characters</small
        >
      }
    </div>
    <div class="form-group m-2">
      <label>Last Name</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter Last name"
        name="lastName"
        [(ngModel)]="userObject.lastName"
        required
      />
    </div>
    <div class="form-group m-2">
      <label>Email</label>
      <input
        type="email"
        class="form-control"
        placeholder="Enter email"
        name="email"
        [(ngModel)]="userObject.email"
        required
        email
      />
    </div>
    <div class="form-group m-2">
      <label>Pass word</label>
      <input
        type="password"
        class="form-control"
        placeholder="Enter password"
        name="pass"
        [(ngModel)]="userObject.pass"
        required
      />
    </div>
    <div class="form-check m-2">
      <label>Check me out</label>
      <input
        type="checkbox"
        class="form-check-input"
        name="isCheck"
        [(ngModel)]="userObject.isCheck"
      />
    </div>
    <div class="form-check m-2">
      <label for="course">Choisir ou saisir :</label>
      <input
        type="text"
        id="course"
        class="form-control"
        name="course"
        [(ngModel)]="selectedCourse"
        [ngbTypeahead]="searchCourse$"
        (input)="onInput($event)"
        placeholder="Choisir ou saisir un langage"
      />
    </div>

    <button type="submit" class="btn btn-success" [disabled]="userForm.invalid">
      Submit
    </button>
    <button
      type="button"
      class="btn btn-warning m-2"
      (click)="patchValue(userForm)"
    >
      patchValue
    </button>
  </form>
</div>
