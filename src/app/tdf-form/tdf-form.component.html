<div class="container">
  <form #userForm="ngForm" (ngSubmit)="onSubmit(userForm)">
    <h2 class="text-center m-2">User Registration</h2>
    <div class="form-group m-2">
      <label>First Name</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter First name"
        name="firstName"
        [(ngModel)]="userObject.firstName"
      />
    </div>
    <div class="form-group m-2">
      <label>Last Name</label>
      <input
        type="text"
        class="form-control"
        placeholder="Enter Last name"
        name="lastName"
        [(ngModel)]="userObject.lastName"
      />
    </div>
    <div class="form-group m-2">
      <label>Email</label>
      <input
        type="email"
        class="form-control"
        placeholder="Enter email"
        name="email"
        [(ngModel)]="userObject.email"
      />
    </div>
    <div class="form-group m-2">
      <label>Pass word</label>
      <input
        type="password"
        class="form-control"
        placeholder="Enter password"
        name="pass"
        [(ngModel)]="userObject.pass"
      />
    </div>
    <div class="form-check m-2">
      <label>Check me out</label>
      <input
        type="checkbox"
        class="form-check-input"
        name="isCheck"
        [(ngModel)]="userObject.isCheck"
      />
    </div>

    <button type="submit" class="btn btn-success">Submit</button>
    <button
      type="button"
      class="btn btn-warning m-2"
      (click)="setValue(userForm)"
    >
      setValue
    </button>
    <button
      type="button"
      class="btn btn-warning m-2"
      (click)="patchValue(userForm)"
    >
      patchValue
    </button>
  </form>
</div>
