<div class="product-edit">
  <h2>Modifier le produit</h2>

  <div *ngIf="isLoading" class="text-center py-4">Chargement du produit...</div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <form
    *ngIf="!isLoading"
    #productForm="ngForm"
    (ngSubmit)="submitForm(productForm)"
    novalidate
  >
    <div class="mb-3">
      <label for="name" class="form-label">Nom</label>
      <input
        id="name"
        name="name"
        type="text"
        class="form-control"
        required
        [(ngModel)]="product.name"
      />
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea
        id="description"
        name="description"
        class="form-control"
        rows="4"
        required
        [(ngModel)]="product.description"
      ></textarea>
    </div>

    <div class="mb-3">
      <label for="price" class="form-label">Prix</label>
      <input
        id="price"
        name="price"
        type="number"
        step="0.01"
        class="form-control"
        required
        [(ngModel)]="product.price"
      />
    </div>

    <div class="mb-3">
      <label for="reference" class="form-label">Référence</label>
      <input
        id="reference"
        name="reference"
        type="text"
        class="form-control"
        required
        [(ngModel)]="product.reference"
      />
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-primary"
        type="submit"
        [disabled]="productForm.invalid || isSubmitting"
      >
        {{ isSubmitting ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
      <a class="btn btn-outline-secondary" routerLink="/product-list">
        Annuler
      </a>
    </div>
  </form>
</div>
