<div class="product-add">
  <div class="card mx-auto" style="max-width: 720px">
    <div class="card-body">
      <h3 class="card-title mb-4">Ajouter un produit</h3>

      <form #productForm="ngForm" (ngSubmit)="submitForm(productForm)">
        <div class="mb-3">
          <label for="name" class="form-label">Nom</label>
          <input
            id="name"
            name="name"
            type="text"
            class="form-control"
            required
            minlength="2"
            [(ngModel)]="product.name"
          />
          <div
            *ngIf="productForm.submitted && productForm.controls['name']?.invalid"
            class="text-danger small mt-1"
          >
            Le nom est requis.
          </div>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea
            id="description"
            name="description"
            class="form-control"
            rows="4"
            required
            minlength="5"
            [(ngModel)]="product.description"
          ></textarea>
          <div
            *ngIf="productForm.submitted && productForm.controls['description']?.invalid"
            class="text-danger small mt-1"
          >
            La description est requise.
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="price" class="form-label">Prix</label>
            <input
              id="price"
              name="price"
              type="number"
              class="form-control"
              required
              min="0"
              step="0.01"
              [(ngModel)]="product.price"
            />
            <div
              *ngIf="productForm.submitted && productForm.controls['price']?.invalid"
              class="text-danger small mt-1"
            >
              Le prix est requis et doit être un nombre positif.
            </div>
          </div>

          <div class="col-md-6">
            <label for="reference" class="form-label">Référence</label>
            <input
              id="reference"
              name="reference"
              type="text"
              class="form-control"
              required
              minlength="2"
              [(ngModel)]="product.reference"
            />
            <div
              *ngIf="productForm.submitted && productForm.controls['reference']?.invalid"
              class="text-danger small mt-1"
            >
              La référence est requise.
            </div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="productForm.invalid || isSubmitting"
          >
            Enregistrer
          </button>
          <a class="btn btn-secondary" routerLink="/product-list">Annuler</a>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger mt-3">
          {{ errorMessage }}
        </div>
      </form>
    </div>
  </div>
</div>
